<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Quack Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: Canvas;
      color: CanvasText;
    }
    main {
      width: min(100% - 32px, 380px);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 24px;
      color: color-mix(in srgb, CanvasText 72%, Canvas);
    }
    form {
      display: grid;
      gap: 14px;
    }
    label {
      display: grid;
      gap: 6px;
      font-size: 14px;
      font-weight: 600;
    }
    input {
      box-sizing: border-box;
      width: 100%;
      padding: 10px 12px;
      border: 1px solid color-mix(in srgb, CanvasText 22%, Canvas);
      border-radius: 6px;
      font: inherit;
      background: Canvas;
      color: CanvasText;
    }
    button {
      padding: 10px 12px;
      border: 0;
      border-radius: 6px;
      font: inherit;
      font-weight: 700;
      background: #1677c8;
      color: white;
      cursor: pointer;
    }
    .error {
      margin: 0 0 14px;
      color: #b42318;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>Quack Admin</h1>
    {{if .LoggedIn}}
      <p>Signed in as {{.User.Username}}.</p>
      <form method="post" action="/logout">
        <button type="submit">Log out</button>
      </form>
    {{else}}
      <p>Sign in to manage Quack.</p>
      {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
      <form method="post" action="/login">
        <label>
          Username
          <input name="username" autocomplete="username" required>
        </label>
        <label>
          Password
          <input name="password" type="password" autocomplete="current-password" required>
        </label>
        <button type="submit">Log in</button>
      </form>
    {{end}}
  </main>
</body>
</html>
