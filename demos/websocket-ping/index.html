<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WebSocket Ping</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --panel-2: #eef2f5;
        --text: #172026;
        --muted: #66737f;
        --border: #cfd8df;
        --accent: #107c6f;
        --accent-2: #d45232;
        --good: #11875d;
        --warn: #9a5a00;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111517;
          --panel: #1a2024;
          --panel-2: #242c31;
          --text: #eef3f4;
          --muted: #a8b3ba;
          --border: #344047;
          --accent: #39bfae;
          --accent-2: #ff8766;
          --good: #53d69f;
          --warn: #ffc25a;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(980px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 20px;
        align-items: end;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 6vw, 4rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-width: 168px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
        font-weight: 650;
      }

      .dot {
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: var(--warn);
      }

      .status[data-state="open"] .dot {
        background: var(--good);
      }

      .status[data-state="closed"] .dot {
        background: var(--accent-2);
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 360px) minmax(0, 1fr);
        gap: 20px;
        align-items: start;
      }

      .panel {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
      }

      .controls {
        padding: 18px;
      }

      label {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
        color: var(--muted);
        font-size: 0.92rem;
        font-weight: 650;
      }

      input {
        width: 100%;
        min-width: 0;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--panel-2);
        color: var(--text);
        padding: 10px 12px;
        font: inherit;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      button {
        min-height: 42px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--panel-2);
        color: var(--text);
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button.primary {
        border-color: color-mix(in srgb, var(--accent), #000 10%);
        background: var(--accent);
        color: #ffffff;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        border-top: 1px solid var(--border);
      }

      .metric {
        min-width: 0;
        padding: 16px;
        border-right: 1px solid var(--border);
      }

      .metric:last-child {
        border-right: 0;
      }

      .metric span {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 750;
        text-transform: uppercase;
      }

      .metric strong {
        display: block;
        min-height: 30px;
        overflow-wrap: anywhere;
        font-size: 1.5rem;
      }

      .activity {
        overflow: hidden;
      }

      canvas {
        display: block;
        width: 100%;
        height: 156px;
        border-bottom: 1px solid var(--border);
        background: var(--panel-2);
      }

      .log {
        height: 340px;
        overflow: auto;
        margin: 0;
        padding: 14px;
        font: 0.88rem/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      @media (max-width: 760px) {
        main {
          width: min(100vw - 24px, 560px);
          padding: 20px 0;
        }

        header,
        .layout {
          grid-template-columns: 1fr;
        }

        .status {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>WebSocket Ping</h1>
          <p>Open the socket, send JSON pings, and watch round-trip latency from this browser session.</p>
        </div>
        <div class="status" data-state="closed" id="status">
          <span class="dot" aria-hidden="true"></span>
          <span id="statusText">Closed</span>
        </div>
      </header>

      <section class="layout" aria-label="WebSocket ping demo">
        <div class="panel">
          <div class="controls">
            <label>
              WebSocket URL
              <input id="url" autocomplete="off">
            </label>

            <div class="buttons">
              <button class="primary" id="connect">Connect</button>
              <button id="ping" disabled>Ping</button>
              <button id="close" disabled>Close</button>
            </div>
          </div>

          <div class="metrics">
            <div class="metric">
              <span>Sent</span>
              <strong id="sent">0</strong>
            </div>
            <div class="metric">
              <span>Pong</span>
              <strong id="received">0</strong>
            </div>
            <div class="metric">
              <span>RTT</span>
              <strong id="rtt">-</strong>
            </div>
          </div>
        </div>

        <div class="panel activity">
          <canvas id="chart" width="900" height="260" aria-label="Latency chart"></canvas>
          <pre class="log" id="log"></pre>
        </div>
      </section>
    </main>

    <script>
      const urlInput = document.querySelector("#url");
      const statusBox = document.querySelector("#status");
      const statusText = document.querySelector("#statusText");
      const connectButton = document.querySelector("#connect");
      const pingButton = document.querySelector("#ping");
      const closeButton = document.querySelector("#close");
      const sentEl = document.querySelector("#sent");
      const receivedEl = document.querySelector("#received");
      const rttEl = document.querySelector("#rtt");
      const logEl = document.querySelector("#log");
      const canvas = document.querySelector("#chart");
      const ctx = canvas.getContext("2d");

      let socket;
      let nextSeq = 1;
      let sent = 0;
      let received = 0;
      const pending = new Map();
      const samples = [];

      const defaultScheme = location.protocol === "https:" ? "wss" : "ws";
      urlInput.value = `${defaultScheme}://${location.host}/ws`;

      function setState(state, label) {
        statusBox.dataset.state = state;
        statusText.textContent = label;
        connectButton.disabled = state === "open" || state === "connecting";
        pingButton.disabled = state !== "open";
        closeButton.disabled = state !== "open";
      }

      function writeLog(direction, value) {
        const time = new Date().toLocaleTimeString();
        const line = `[${time}] ${direction} ${typeof value === "string" ? value : JSON.stringify(value)}\n`;
        logEl.textContent = line + logEl.textContent;
      }

      function updateMetrics(rtt) {
        sentEl.textContent = sent;
        receivedEl.textContent = received;
        rttEl.textContent = Number.isFinite(rtt) ? `${Math.round(rtt)} ms` : "-";
      }

      function drawChart() {
        const width = canvas.width;
        const height = canvas.height;
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue("--panel-2");
        ctx.fillRect(0, 0, width, height);

        ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue("--border");
        ctx.lineWidth = 1;
        for (let i = 1; i < 4; i += 1) {
          const y = Math.round((height / 4) * i);
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(width, y);
          ctx.stroke();
        }

        if (samples.length < 2) {
          return;
        }

        const max = Math.max(50, ...samples) * 1.25;
        ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue("--accent");
        ctx.lineWidth = 4;
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        ctx.beginPath();
        samples.forEach((sample, index) => {
          const x = (index / Math.max(1, samples.length - 1)) * (width - 24) + 12;
          const y = height - 16 - (sample / max) * (height - 32);
          if (index === 0) {
            ctx.moveTo(x, y);
          } else {
            ctx.lineTo(x, y);
          }
        });
        ctx.stroke();
      }

      function connect() {
        if (socket && socket.readyState === WebSocket.OPEN) {
          return;
        }

        setState("connecting", "Connecting");
        socket = new WebSocket(urlInput.value);

        socket.addEventListener("open", () => {
          setState("open", "Open");
          writeLog("<-", "connected");
        });

        socket.addEventListener("message", (event) => {
          let message = event.data;
          try {
            message = JSON.parse(event.data);
          } catch (_) {
            // Keep non-JSON payloads readable in the log.
          }

          writeLog("->", message);
          if (message.type === "pong" && pending.has(message.seq)) {
            const rtt = performance.now() - pending.get(message.seq);
            pending.delete(message.seq);
            received += 1;
            samples.push(rtt);
            if (samples.length > 48) {
              samples.shift();
            }
            updateMetrics(rtt);
            drawChart();
          }
        });

        socket.addEventListener("close", () => {
          pending.clear();
          setState("closed", "Closed");
          writeLog("<-", "closed");
        });

        socket.addEventListener("error", () => {
          setState("closed", "Error");
          writeLog("<-", "socket error");
        });
      }

      function ping() {
        if (!socket || socket.readyState !== WebSocket.OPEN) {
          return;
        }

        const payload = {
          type: "ping",
          seq: nextSeq,
          sentAt: new Date().toISOString(),
        };
        pending.set(nextSeq, performance.now());
        nextSeq += 1;
        sent += 1;
        socket.send(JSON.stringify(payload));
        writeLog("<-", payload);
        updateMetrics(NaN);
      }

      connectButton.addEventListener("click", connect);
      pingButton.addEventListener("click", ping);
      closeButton.addEventListener("click", () => socket?.close(1000, "demo close"));

      drawChart();
    </script>
  </body>
</html>
