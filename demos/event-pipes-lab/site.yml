routes:
  - path: /ws
    kind: websocket
    runtime: starlark
    entrypoint: api/pipes.star

  - path: /
    kind: static
    root: public

pipes:
  - name: pipe-demo.map_reduce.start
    retain: 128
  - name: pipe-demo.map_reduce.split
    retain: 128
  - name: pipe-demo.map_reduce.map_0
    retain: 128
  - name: pipe-demo.map_reduce.map_1
    retain: 128
  - name: pipe-demo.map_reduce.map_2
    retain: 128
  - name: pipe-demo.map_reduce.map_3
    retain: 128
  - name: pipe-demo.map_reduce.reduce
    retain: 128

  - name: pipe-demo.scatter_gather.start
    retain: 128
  - name: pipe-demo.scatter_gather.profile
    retain: 128
  - name: pipe-demo.scatter_gather.pricing
    retain: 128
  - name: pipe-demo.scatter_gather.inventory
    retain: 128
  - name: pipe-demo.scatter_gather.risk
    retain: 128
  - name: pipe-demo.scatter_gather.gather
    retain: 128

  - name: pipe-demo.sharding.start
    retain: 128
  - name: pipe-demo.sharding.route
    retain: 128
  - name: pipe-demo.sharding.shard_0
    retain: 128
  - name: pipe-demo.sharding.shard_1
    retain: 128
  - name: pipe-demo.sharding.shard_2
    retain: 128
  - name: pipe-demo.sharding.shard_3
    retain: 128
  - name: pipe-demo.sharding.merge
    retain: 128

events:
  - selector: pipe-demo.map_reduce.start
    on_event: api/map_reduce.star:start_node
  - selector: pipe-demo.map_reduce.split
    on_event: api/map_reduce.star:split_node
  - selector: pipe-demo.map_reduce.map_0
    on_event: api/map_reduce.star:map_0_node
  - selector: pipe-demo.map_reduce.map_1
    on_event: api/map_reduce.star:map_1_node
  - selector: pipe-demo.map_reduce.map_2
    on_event: api/map_reduce.star:map_2_node
  - selector: pipe-demo.map_reduce.map_3
    on_event: api/map_reduce.star:map_3_node
  - selector: pipe-demo.map_reduce.reduce
    on_event: api/map_reduce.star:reduce_node

  - selector: pipe-demo.scatter_gather.start
    on_event: api/scatter_gather.star:start_node
  - selector: pipe-demo.scatter_gather.profile
    on_event: api/scatter_gather.star:profile_node
  - selector: pipe-demo.scatter_gather.pricing
    on_event: api/scatter_gather.star:pricing_node
  - selector: pipe-demo.scatter_gather.inventory
    on_event: api/scatter_gather.star:inventory_node
  - selector: pipe-demo.scatter_gather.risk
    on_event: api/scatter_gather.star:risk_node
  - selector: pipe-demo.scatter_gather.gather
    on_event: api/scatter_gather.star:gather_node

  - selector: pipe-demo.sharding.start
    on_event: api/sharding.star:start_node
  - selector: pipe-demo.sharding.route
    on_event: api/sharding.star:route_node
  - selector: pipe-demo.sharding.shard_0
    on_event: api/sharding.star:shard_0_node
  - selector: pipe-demo.sharding.shard_1
    on_event: api/sharding.star:shard_1_node
  - selector: pipe-demo.sharding.shard_2
    on_event: api/sharding.star:shard_2_node
  - selector: pipe-demo.sharding.shard_3
    on_event: api/sharding.star:shard_3_node
  - selector: pipe-demo.sharding.merge
    on_event: api/sharding.star:merge_node
