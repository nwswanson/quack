<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PixelDraw</title>
    <link rel="stylesheet" href="/styles.css?v=palette-24-2">
  </head>
  <body>
    <main>
      <header class="topbar">
        <h1>PixelDraw</h1>
        <div class="status" data-state="closed" id="status">
          <span class="status-dot" aria-hidden="true"></span>
          <span id="statusText">Connecting</span>
        </div>
	<p>Realtime demo of Quack's websockets and memory module. Draw with your friends! (This is a public site, please be nice.)
      </header>

      <section class="workspace" aria-label="Pixel canvas">
        <aside class="tools" aria-label="Color tools">
          <div class="palette" id="palette" role="radiogroup" aria-label="Paint color">
            <button class="swatch is-active" type="button" data-color="white" role="radio" aria-checked="true" title="White">
              <span style="background: #ffffff"></span>
            </button>
            <button class="swatch" type="button" data-color="light_gray" role="radio" aria-checked="false" title="Light gray">
              <span style="background: #c7ccd1"></span>
            </button>
            <button class="swatch" type="button" data-color="gray" role="radio" aria-checked="false" title="Gray">
              <span style="background: #7f858d"></span>
            </button>
            <button class="swatch" type="button" data-color="black" role="radio" aria-checked="false" title="Black">
              <span style="background: #16191d"></span>
            </button>
            <button class="swatch" type="button" data-color="maroon" role="radio" aria-checked="false" title="Maroon">
              <span style="background: #8f1d2c"></span>
            </button>
            <button class="swatch" type="button" data-color="red" role="radio" aria-checked="false" title="Red">
              <span style="background: #e13a32"></span>
            </button>
            <button class="swatch" type="button" data-color="orange" role="radio" aria-checked="false" title="Orange">
              <span style="background: #f07f24"></span>
            </button>
            <button class="swatch" type="button" data-color="yellow" role="radio" aria-checked="false" title="Yellow">
              <span style="background: #ffd447"></span>
            </button>
            <button class="swatch" type="button" data-color="olive" role="radio" aria-checked="false" title="Olive">
              <span style="background: #8f9738"></span>
            </button>
            <button class="swatch" type="button" data-color="green" role="radio" aria-checked="false" title="Green">
              <span style="background: #239a57"></span>
            </button>
            <button class="swatch" type="button" data-color="lime" role="radio" aria-checked="false" title="Lime">
              <span style="background: #5ac85a"></span>
            </button>
            <button class="swatch" type="button" data-color="teal" role="radio" aria-checked="false" title="Teal">
              <span style="background: #1e8f8f"></span>
            </button>
            <button class="swatch" type="button" data-color="cyan" role="radio" aria-checked="false" title="Cyan">
              <span style="background: #48c7d8"></span>
            </button>
            <button class="swatch" type="button" data-color="blue" role="radio" aria-checked="false" title="Blue">
              <span style="background: #2469d8"></span>
            </button>
            <button class="swatch" type="button" data-color="navy" role="radio" aria-checked="false" title="Navy">
              <span style="background: #173a8f"></span>
            </button>
            <button class="swatch" type="button" data-color="purple" role="radio" aria-checked="false" title="Purple">
              <span style="background: #7246b8"></span>
            </button>
            <button class="swatch" type="button" data-color="magenta" role="radio" aria-checked="false" title="Magenta">
              <span style="background: #cf4eb8"></span>
            </button>
            <button class="swatch" type="button" data-color="pink" role="radio" aria-checked="false" title="Pink">
              <span style="background: #f58db2"></span>
            </button>
            <button class="swatch" type="button" data-color="peach" role="radio" aria-checked="false" title="Peach">
              <span style="background: #f5a15d"></span>
            </button>
            <button class="swatch" type="button" data-color="tan" role="radio" aria-checked="false" title="Tan">
              <span style="background: #d7b37a"></span>
            </button>
            <button class="swatch" type="button" data-color="brown" role="radio" aria-checked="false" title="Brown">
              <span style="background: #8a5938"></span>
            </button>
            <button class="swatch" type="button" data-color="cream" role="radio" aria-checked="false" title="Cream">
              <span style="background: #fff2b5"></span>
            </button>
            <button class="swatch" type="button" data-color="mint" role="radio" aria-checked="false" title="Mint">
              <span style="background: #a9e6b0"></span>
            </button>
            <button class="swatch" type="button" data-color="sky" role="radio" aria-checked="false" title="Sky blue">
              <span style="background: #8ec9ff"></span>
            </button>
          </div>

          <dl class="meta">
            <div>
              <dt>Revision</dt>
              <dd id="revision">0</dd>
            </div>
            <div>
              <dt>Grid</dt>
              <dd id="gridSize">48 x 48</dd>
            </div>
          </dl>
        </aside>

        <div class="canvas-shell">
          <canvas id="canvas" width="960" height="960" aria-label="Collaborative pixel canvas"></canvas>
        </div>
      </section>
    </main>

    <script src="/app.js?v=palette-24-2"></script>
  </body>
</html>
