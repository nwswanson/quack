<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PixelDraw</title>
    <link rel="stylesheet" href="/styles.css?v=drawings-1">
  </head>
  <body>
    <main>
      <header class="topbar">
        <div>
          <h1>PixelDraw</h1>
          <p>Realtime demo of Quack's websockets and memory module. Draw with your friends! (This is a public site, please be nice.)</p>
        </div>
        <div class="status" data-state="closed" id="status">
          <span class="status-dot" aria-hidden="true"></span>
          <span id="statusText">Connecting</span>
        </div>
      </header>

      <section class="drawing-tabs" aria-label="Drawings">
        <div class="tabs" id="tabs" role="tablist" aria-label="Drawing tabs"></div>
        <div class="tab-actions">
          <button id="newDrawing" class="icon-button" type="button" title="New drawing" aria-label="New drawing">+</button>
          <button id="deleteDrawing" class="icon-button danger" type="button" title="Delete drawing" aria-label="Delete drawing">&times;</button>
        </div>
      </section>

      <section class="workspace" aria-label="Pixel canvas">
        <aside class="tools" aria-label="Color tools">
          <div class="palette" id="palette" role="radiogroup" aria-label="Paint color"></div>

          <dl class="meta">
            <div>
              <dt>Revision</dt>
              <dd id="revision">0</dd>
            </div>
            <div>
              <dt>Grid</dt>
              <dd id="gridSize">48 x 48</dd>
            </div>
          </dl>
        </aside>

        <div class="canvas-shell">
          <canvas id="canvas" width="960" height="960" aria-label="Collaborative pixel canvas"></canvas>
        </div>
      </section>
    </main>

    <script src="/app.js?v=drawings-1"></script>
  </body>
</html>
