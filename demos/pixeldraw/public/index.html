<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PixelDraw</title>
    <link rel="stylesheet" href="/styles.css?v=tabs-1">
  </head>
  <body>
    <main>
      <header class="topbar">
        <div>
          <h1>PixelDraw</h1>
          <p>Realtime demo of Quack's websockets and memory module. Draw with your friends! (This is a public site, please be nice.)</p>
        </div>
        <div class="status" data-state="closed" id="status">
          <span class="status-dot" aria-hidden="true"></span>
          <span id="statusText">Connecting</span>
        </div>
      </header>

      <section class="drawing-tabs" aria-label="Drawings">
        <form class="namespace-login" id="namespaceForm">
          <input id="namespaceInput" name="namespace" type="text" maxlength="64" autocomplete="off" spellcheck="false" placeholder="namespace" aria-label="Namespace">
          <button id="namespaceButton" class="file-button" type="submit">Open</button>
        </form>
        <div class="tabs" id="tabs" role="tablist" aria-label="Drawing tabs"></div>
        <input id="drawingFile" type="file" accept=".json,application/json" hidden>
        <div class="tab-actions">
          <button id="saveDrawing" class="file-button" type="button" title="Save drawing" aria-label="Save drawing">Save</button>
          <button id="loadDrawing" class="file-button" type="button" title="Load drawing" aria-label="Load drawing">Load</button>
          <button id="renameDrawing" class="file-button" type="button" title="Name tab" aria-label="Name tab">Name</button>
          <button id="newDrawing" class="icon-button" type="button" title="New drawing" aria-label="New drawing">+</button>
          <button id="deleteDrawing" class="icon-button danger" type="button" title="Delete drawing" aria-label="Delete drawing">&times;</button>
        </div>
      </section>

      <section class="workspace" aria-label="Pixel canvas">
        <aside class="tools" aria-label="Color tools">
          <div class="brushes" id="brushes" role="radiogroup" aria-label="Brush">
            <button class="brush-button is-active" type="button" role="radio" data-brush="square" data-size="1" title="1 x 1 brush" aria-label="1 x 1 brush" aria-checked="true">
              <span class="brush-preview brush-preview-1" aria-hidden="true"></span>
            </button>
            <button class="brush-button" type="button" role="radio" data-brush="square" data-size="2" title="2 x 2 square brush" aria-label="2 x 2 square brush" aria-checked="false">
              <span class="brush-preview brush-preview-2" aria-hidden="true"></span>
            </button>
            <button class="brush-button" type="button" role="radio" data-brush="round" data-size="4" title="4 x 4 round brush" aria-label="4 x 4 round brush" aria-checked="false">
              <span class="brush-preview brush-preview-round" aria-hidden="true"></span>
            </button>
            <button class="brush-button" type="button" role="radio" data-brush="spray" data-size="1" title="Spray brush" aria-label="Spray brush" aria-checked="false">
              <span class="brush-preview brush-preview-spray" aria-hidden="true"></span>
            </button>
          </div>

          <div class="palette" id="palette" role="radiogroup" aria-label="Paint color"></div>

          <dl class="meta">
            <div>
              <dt>Revision</dt>
              <dd id="revision">0</dd>
            </div>
            <div>
              <dt>Grid</dt>
              <dd id="gridSize">48 x 48</dd>
            </div>
          </dl>
        </aside>

        <div class="canvas-shell">
          <canvas id="canvas" width="960" height="960" aria-label="Collaborative pixel canvas"></canvas>
        </div>
      </section>
    </main>

    <script src="/app.js?v=tabs-2"></script>
  </body>
</html>
