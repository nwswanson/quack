routes:
  - path: /
    kind: static
    root: public
  - path: /ws
    kind: websocket
    runtime: starlark
    entrypoint: api/pixels.star
  - path: /api/colors
    kind: http
    runtime: starlark
    entrypoint: api/colors.star
    methods: [GET]
pipes:
  - name: pixeldraw.canvas
    retain: 64
  - selector: pixeldraw.canvas.*
    retain: 64
    key_by: topic
    max_topics: 256
