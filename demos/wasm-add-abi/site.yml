wasm:
  modules:
    calculator:
      path: plugins/add.wasm
      abi: quack:wasm-v1
      limits:
        timeout_ms: 25
        memory_pages: 4
        max_input_bytes: 1024
        max_output_bytes: 1024

routes:
  - path: /
    kind: http
    runtime: starlark
    entrypoint: api/home.star
    methods: [GET]
    expose_errors: true
  - path: /add
    kind: http
    runtime: starlark
    entrypoint: api/add.star
    methods: [GET]
    expose_errors: true
