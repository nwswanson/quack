wasm:
  modules:
    images:
      path: plugins/image_resize.opt.wasm
      abi: quack:wasm-v1
      retain_instances: 1
      limits:
        timeout_ms: 1000
        memory_pages: 192
        max_input_bytes: 16777216
        max_output_bytes: 16777216

routes:
  - path: /
    kind: static
    root: public
  - path: /api/resize
    kind: http
    runtime: starlark
    entrypoint: api/resize.star
    methods: [POST]
    expose_errors: true
    limits:
      max_request_bytes: 10485760
      max_response_bytes: 16777216
      max_duration_ms: 2000
